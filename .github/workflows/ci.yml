name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - run: go mod tidy
      - run: go vet ./...
      - run: go test -short -v -race ./...
      - run: go build -o netberth ./cmd/netberth

  docker:
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t netberth:latest .
      - name: Test health check
        run: |
          docker run -d --name netberth-test -p 8443:8443 \
            -e NB_JWT_SECRET=ci-test-secret-do-not-use \
            -v /tmp/nh-data:/app/data \
            netberth:latest
          sleep 5
          curl -sf --retry 10 --retry-delay 2 http://localhost:8443/api/v1/system/status
          docker stop netberth-test

  publish:
    needs: docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            netberth/netberth:${{ github.ref_name }}
            netberth/netberth:latest
