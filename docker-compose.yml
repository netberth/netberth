services:
  netberth:
    build: .
    container_name: netberth
    restart: unless-stopped
    network_mode: host
    environment:
      - NB_SERVER_PORT=8443
      - NB_LOG_LEVEL=info
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs
      - /mnt/user:/storage:ro
